# LENS Workbench -- Governance Repo Setup (EXAMPLE)
# ---------------------------------------------------------------
# Copy this file to:  _bmad-output/lens-work/governance-setup.yaml
# Then update the values below for your organization.
#
# This file tells LENS where your governance repo lives so that
# constitutions, roster, policies, and repo-inventory are resolved
# at runtime.  Without this file, governance workflows will not run.
# ---------------------------------------------------------------

# Governance repository coordinates
repo:
  # Display name of the governance repo
  name: my-org.governance

  # Git remote URL (HTTPS or SSH)
  remote_url: https://github.com/my-org/my-governance-repo

  # Local clone path relative to the control repo root
  # This is where `@lens sync` and `check-repos` will clone/pull
  local_path: TargetProjects/my-domain/my-governance-repo

  # Branch that governance changes merge into
  default_branch: main

  # Must be "governance" -- used by lifecycle data-zone enforcement
  role: governance

# Artifacts managed in the governance repo
# These paths are relative to the governance repo root (local_path above)
artifacts:
  constitutions_dir: constitutions/
  roster_dir: roster/
  policies_dir: policies/
  repo_inventory: repo-inventory.yaml

# Branch strategy for governance changes
branch_strategy:
  # Pattern for governance branches in the governance repo
  pattern: "universal/{slug}"

  # Target branch that governance PRs merge into
  merge_target: main

  # Require a pull request for governance changes
  pr_required: true

  # Roles allowed to write governance artifacts
  write_roles:
    - Tech Lead
    - Architect

# Sync settings
sync:
  # How often (seconds) to auto-pull the governance repo.
  # Set to 0 to disable automatic pulls (manual sync only).
  # Default: 900 (15 minutes)
  ttl: 900

# ---------------------------------------------------------------
# Source Repository Tracking
# ---------------------------------------------------------------
# Tracks the bmad.lens.release and bmad.lens.copilot clones that
# provide module code and IDE integration to this control repo.
# The background preflight uses these to detect when your local
# clones are behind their remote branches and offers to update.
#
# Adjust the branch values to match your release channel.
# Common branches:
#   lens_release: release/4.5, release/5.0, main (bleeding edge)
#   lens_copilot: main

source_repos:
  lens_release:
    # Local clone path relative to control repo root
    local_path: bmad.lens.release

    # Git remote URL (HTTPS or SSH)
    remote_url: https://github.com/my-org/bmad.lens.release

    # Branch to track for updates
    branch: release/4.5

    # Must be "module-source"
    role: module-source

  lens_copilot:
    # Local clone path — typically .github/ for Copilot integration
    local_path: .github

    # Git remote URL (HTTPS or SSH)
    remote_url: https://github.com/my-org/bmad.lens.copilot

    # Branch to track for updates
    branch: main

    # Must be "ide-integration"
    role: ide-integration

# Source sync settings
source_sync:
  # How often (seconds) to check source repos for updates.
  # Less frequent than governance since module updates are rarer.
  # Set to 0 to disable automatic checks (manual only).
  # Default: 3600 (1 hour)
  ttl: 3600
