topics:
  - id: init-feature
    command: /init-feature
    description: Initialize a new feature with branches, YAML, and PR
    phases: [preplan]
    tracks: [all]
    category: lifecycle

  - id: quickplan
    command: /quickplan
    description: Run end-to-end planning pipeline (business plan → stories)
    phases: [businessplan, techplan, sprintplan]
    tracks: [quickplan, full]
    category: planning

  - id: log-problem
    command: /log-problem
    description: Log a problem with phase and category tags
    phases: [all]
    tracks: [all]
    category: tracking

  - id: status
    command: /status
    description: Show current feature status and portfolio overview
    phases: [all]
    tracks: [all]
    category: navigation

  - id: next
    command: /next
    description: Get contextual suggestion for what to do next
    phases: [all]
    tracks: [all]
    category: navigation

  - id: switch
    command: /switch
    description: Switch active feature context
    phases: [all]
    tracks: [all]
    category: navigation

  - id: help
    command: /help
    description: Show contextual help for current state
    phases: [all]
    tracks: [all]
    category: navigation

  - id: pause
    command: /pause
    description: Pause a feature and preserve state
    phases: [all]
    tracks: [all]
    category: lifecycle

  - id: resume
    command: /resume
    description: Resume a paused feature
    phases: [all]
    tracks: [all]
    category: lifecycle

  - id: retrospective
    command: /retrospective
    description: Run root cause analysis on feature problems
    phases: [dev, complete]
    tracks: [all]
    category: lifecycle

  - id: complete
    command: /complete
    description: Finalize a feature — retrospective, documentation, archive
    phases: [dev]
    tracks: [all]
    category: lifecycle

  - id: move-feature
    command: /move-feature
    description: Move feature to different domain/service
    phases: [all]
    tracks: [all]
    category: reorganization

  - id: split-feature
    command: /split-feature
    description: Split feature scope or stories into two features
    phases: [businessplan, techplan, sprintplan]
    tracks: [all]
    category: reorganization

  - id: dashboard
    command: /dashboard
    description: Generate HTML cross-feature dashboard
    phases: [all]
    tracks: [all]
    category: reporting

  - id: bmad-brainstorming
    command: /bmad-brainstorming
    description: Run BMAD brainstorming with active Lens feature and repo context
    phases: [preplan]
    tracks: [all]
    category: planning

  - id: bmad-create-prd
    command: /bmad-create-prd
    description: Create a PRD using the active Lens feature, governance, and output-path context
    phases: [businessplan]
    tracks: [all]
    category: planning

  - id: bmad-create-architecture
    command: /bmad-create-architecture
    description: Create architecture artifacts using the active Lens feature and governance context
    phases: [techplan]
    tracks: [all]
    category: planning

  - id: bmad-create-epics-and-stories
    command: /bmad-create-epics-and-stories
    description: Generate epics and stories using the active Lens feature and artifact paths
    phases: [devproposal]
    tracks: [all]
    category: planning

  - id: bmad-quick-dev
    command: /bmad-quick-dev
    description: Run quick dev against the active Lens feature and resolved target repo
    phases: [dev]
    tracks: [all]
    category: implementation

  - id: bmad-code-review
    command: /bmad-code-review
    description: Run BMAD code review against the active Lens feature and resolved target repo
    phases: [dev]
    tracks: [all]
    category: implementation

  # Lens Next Phase Skills
  - id: lens-preplan
    command: /lens-preplan
    description: Run PrePlan phase with Lens governance (brainstorm, research, product brief)
    phases: [preplan]
    tracks: [full, spike]
    category: planning

  - id: lens-businessplan
    command: /lens-businessplan
    description: Run BusinessPlan phase with Lens governance (PRD, UX design)
    phases: [businessplan]
    tracks: [full, feature]
    category: planning

  - id: lens-techplan
    command: /lens-techplan
    description: Run TechPlan phase with Lens governance (architecture, technical design)
    phases: [techplan]
    tracks: [full, feature, tech-change, hotfix, hotfix-express]
    category: planning

  - id: lens-devproposal
    command: /lens-devproposal
    description: Run DevProposal phase with Lens governance (epics, stories, readiness)
    phases: [devproposal]
    tracks: [full, feature, tech-change, quickdev]
    category: planning

  - id: lens-sprintplan
    command: /lens-sprintplan
    description: Run SprintPlan phase with Lens governance (sprint planning, story files)
    phases: [sprintplan]
    tracks: [full, feature, tech-change]
    category: planning

  - id: lens-expressplan
    command: /lens-expressplan
    description: Run ExpressPlan phase with Lens governance (all artifacts in one session)
    phases: [expressplan]
    tracks: [express]
    category: planning
