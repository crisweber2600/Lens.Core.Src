topics:
  - id: init-milestone
    command: /init-milestone
    description: Initialize a new milestone with branches, YAML, and PR
    phases: [preplan]
    tracks: [all]
    category: lifecycle

  - id: quickplan
    command: /quickplan
    description: Run end-to-end planning pipeline (business plan → stories)
    phases: [businessplan, techplan, finalizeplan]
    tracks: [quickplan, full]
    category: planning

  - id: log-problem
    command: /log-problem
    description: Log a problem with phase and category tags
    phases: [all]
    tracks: [all]
    category: tracking

  - id: next
    command: /next
    description: Get contextual suggestion for what to do next
    phases: [all]
    tracks: [all]
    category: navigation

  - id: batch
    command: /batch
    description: Generate or resume a two-pass batch intake for the current planning target
    phases: [preplan, businessplan, techplan, finalizeplan, expressplan]
    tracks: [all]
    category: planning

  - id: switch
    command: /switch
    description: Switch active milestone context
    phases: [all]
    tracks: [all]
    category: navigation

  - id: help
    command: /help
    description: Show contextual help for current state
    phases: [all]
    tracks: [all]
    category: navigation

  - id: pause
    command: /pause
    description: Pause a milestone and preserve state
    phases: [all]
    tracks: [all]
    category: lifecycle

  - id: resume
    command: /resume
    description: Resume a paused milestone
    phases: [all]
    tracks: [all]
    category: lifecycle

  - id: retrospective
    command: /retrospective
    description: Run root cause analysis on milestone problems
    phases: [dev, complete]
    tracks: [all]
    category: lifecycle

  - id: complete
    command: /complete
    description: Finalize a milestone — retrospective, documentation, archive
    phases: [dev]
    tracks: [all]
    category: lifecycle

  - id: split-feature
    command: /split-feature
    description: Split milestone scope or stories into two milestones
    phases: [businessplan, techplan, finalizeplan]
    tracks: [all]
    category: reorganization

  - id: dashboard
    command: /dashboard
    description: Generate HTML cross-feature dashboard
    phases: [all]
    tracks: [all]
    category: reporting

  - id: bmad-brainstorming
    command: /bmad-brainstorming
    description: Run BMAD brainstorming with active Lens milestone and repo context
    phases: [preplan]
    tracks: [all]
    category: planning

  - id: bmad-product-brief
    command: /bmad-product-brief
    description: Create a product brief using the active Lens milestone, governance, and output-path context
    phases: [preplan]
    tracks: [all]
    category: planning

  - id: bmad-domain-research
    command: /bmad-domain-research
    description: Run domain research with the active Lens milestone and governance context
    phases: [preplan]
    tracks: [all]
    category: planning

  - id: bmad-market-research
    command: /bmad-market-research
    description: Run market research with the active Lens milestone and governance context
    phases: [preplan]
    tracks: [all]
    category: planning

  - id: bmad-technical-research
    command: /bmad-technical-research
    description: Run technical research with the active Lens milestone and governance context
    phases: [preplan]
    tracks: [all]
    category: planning

  - id: bmad-create-prd
    command: /bmad-create-prd
    description: Create a PRD using the active Lens milestone, governance, and output-path context
    phases: [businessplan]
    tracks: [all]
    category: planning

  - id: bmad-create-ux-design
    command: /bmad-create-ux-design
    description: Create UX design artifacts using the active Lens milestone and governance context
    phases: [businessplan]
    tracks: [all]
    category: planning

  - id: bmad-create-architecture
    command: /bmad-create-architecture
    description: Create architecture artifacts using the active Lens milestone and governance context
    phases: [techplan]
    tracks: [all]
    category: planning

  - id: adversarial-review
    command: /lens-adversarial-review
    description: Stress-test staged planning artifacts and challenge blind spots before handoff
    phases: [preplan, businessplan, techplan]
    tracks: [all]
    category: planning

  - id: bmad-create-epics-and-stories
    command: /bmad-create-epics-and-stories
    description: Generate epics and stories using the active Lens milestone and artifact paths
    phases: [finalizeplan]
    tracks: [all]
    category: planning

  - id: bmad-check-implementation-readiness
    command: /bmad-check-implementation-readiness
    description: Run implementation readiness checks using the active Lens milestone and artifact paths
    phases: [finalizeplan]
    tracks: [all]
    category: planning

  - id: bmad-sprint-planning
    command: /bmad-sprint-planning
    description: Generate sprint tracking using the active Lens milestone and artifact paths
    phases: [finalizeplan]
    tracks: [all]
    category: planning

  - id: bmad-create-story
    command: /bmad-create-story
    description: Create story files using the active Lens milestone and artifact paths
    phases: [finalizeplan]
    tracks: [all]
    category: planning

  - id: bmad-document-project
    command: /bmad-document-project
    description: Capture project structure docs using the active Lens milestone context and governance mirror paths
    phases: [all]
    tracks: [all]
    category: implementation

  - id: bmad-quick-dev
    command: /bmad-quick-dev
    description: Run quick dev against the active Lens milestone and resolved target repo
    phases: [dev]
    tracks: [all]
    category: implementation

  - id: bmad-code-review
    command: /bmad-code-review
    description: Run BMAD code review against the active Lens milestone and resolved target repo
    phases: [dev]
    tracks: [all]
    category: implementation

  # Lens Next Phase Skills
  - id: lens-preplan
    command: /lens-preplan
    description: Run PrePlan phase with Lens governance (brainstorm, research, product brief)
    phases: [preplan]
    tracks: [full, spike]
    category: planning

  - id: lens-businessplan
    command: /lens-businessplan
    description: Run BusinessPlan phase with Lens governance (PRD, UX design)
    phases: [businessplan]
    tracks: [full, feature]
    category: planning

  - id: lens-techplan
    command: /lens-techplan
    description: Run TechPlan phase with Lens governance (architecture, technical design)
    phases: [techplan]
    tracks: [full, feature, tech-change, hotfix, hotfix-express]
    category: planning

  - id: lens-finalizeplan
    command: /lens-finalizeplan
    description: Run FinalizePlan phase with Lens governance (review, bundled planning outputs, PR handoff)
    phases: [finalizeplan]
    tracks: [full, feature, tech-change]
    category: planning

  - id: lens-expressplan
    command: /lens-expressplan
    description: Run ExpressPlan phase with Lens governance (all artifacts in one session)
    phases: [expressplan]
    tracks: [express]
    category: planning
