# Lens Module Configuration
# Generated: 2026-02-17 via BMAD Module workflow (Create mode)

code: lens
name: "Lens"
header: "Unified lifecycle router — one agent, one interface, every phase"
subheader: "Copilot-native orchestration with skills-based delegation and inline governance"
default_selected: false

# Module Type
type: standalone
global: true

# Dependencies
dependencies:
  - core     # BMAD core infrastructure
  - bmm      # Lifecycle workflow execution (planning, architecture, stories)
  - bmb      # Module/agent/workflow building
  - cis      # Creative Innovation Suite (brainstorming, research)
  - tea      # Test Engineering Academy (test planning, quality gates)

optional_dependencies:
  - bmgd     # Game Development (domain-activated)

# Installation Questions
install_questions:
  target_projects_path:
    prompt: "Path to TargetProjects folder (where repos are cloned)"
    default: "../TargetProjects"
    result: "{answer}"

  docs_output_path:
    prompt: "Path for canonical documentation output"
    default: "Docs"
    result: "{answer}"

  enable_telemetry:
    prompt: "Enable lifecycle telemetry dashboards?"
    type: boolean
    default: false
    result: "{answer}"

  discovery_depth:
    prompt: "Default discovery depth?"
    type: single-select
    options:
      - shallow
      - deep
    default: shallow
    result: "{answer}"

  enable_jira_integration:
    prompt: "Enable JIRA integration during discovery?"
    type: boolean
    default: false
    result: "{answer}"

  default_audiences:
    prompt: "Default audience configuration for new initiatives"
    default: "small,medium,large"
    result: "{answer}"

  default_git_remote:
    prompt: "Default git remote name"
    default: "origin"
    result: "{answer}"

# Agent Roster — Single agent with skill-based delegation
agents:
  - id: lens
    file: agents/lens.agent.yaml
    name: Lens
    role: Lifecycle router & orchestrator with skills-based delegation

# Skills — Internal delegation (not user-facing agents)
skills:
  - id: git-orchestration
    file: skills/git-orchestration.md
    description: Branch creation, commits, pushes, topology management

  - id: state-management
    file: skills/state-management.md
    description: state.yaml read/write, event-log.jsonl append, status queries

  - id: discovery
    file: skills/discovery.md
    description: Repo scanning, documentation, bootstrapping, onboarding

  - id: constitution
    file: skills/constitution.md
    description: Inline governance checks at every workflow step

  - id: checklist
    file: skills/checklist.md
    description: Progressive phase gate checklists with expandable detail

# Workflow Categories
workflow_categories:
  phase:
    description: "Phase commands — user-facing lifecycle progression"
    workflows:
      - pre-plan       # Brainstorming, discovery, vision → routes to BMM
      - plan           # Product requirements, epics, features → routes to BMM
      - tech-plan      # Architecture, technical design → routes to BMM
      - story-gen      # Story generation from architecture → routes to BMM
      - review         # Implementation readiness checks, gate validation
      - dev            # Implementation loop — guided coding, testing, PRs

  initiative:
    description: "Initiative and context management"
    workflows:
      - init-initiative  # Create new initiative (domain/service/feature)
      - switch-context   # Switch between active initiatives

  utility:
    description: "State management and recovery"
    workflows:
      - status           # Display current initiative state, phase, branches
      - sync-state       # Reconcile state with git reality
      - fix-state        # Repair corrupted state using event log
      - override-state   # Manual state override (advanced)
      - resume           # Resume interrupted workflow
      - archive          # Archive completed initiative

  discovery:
    description: "Onboarding, repo discovery, bootstrapping"
    workflows:
      - onboard          # First-time user/repo setup
      - discover         # Scan and inventory repositories
      - bootstrap        # Initialize BMAD structure in target repos

  background:
    description: "Auto-triggered operations (not user-invoked)"
    workflows:
      - state-sync           # Validate state.yaml against git branches
      - event-log            # Append to event-log.jsonl
      - branch-validate      # Verify branch topology integrity
      - constitution-check   # Inline governance validation
      - checklist-update     # Update progressive checklist state

  includes:
    description: "Shared reference files included by workflows"
    files:
      - size-topology
      - pr-links
      - artifact-validator

# Prompts (entry point commands)
prompts:
  directory: "prompts/"
  files:
    # Phase Commands
    - lens.pre-plan.prompt.md
    - lens.plan.prompt.md
    - lens.tech-plan.prompt.md
    - lens.story-gen.prompt.md
    - lens.review.prompt.md
    - lens.dev.prompt.md
    # Initiative Commands
    - lens.new.prompt.md
    - lens.new-domain.prompt.md
    - lens.new-service.prompt.md
    - lens.new-feature.prompt.md
    - lens.switch.prompt.md
    # State & Recovery
    - lens.status.prompt.md
    - lens.sync.prompt.md
    - lens.fix.prompt.md
    - lens.override.prompt.md
    - lens.resume.prompt.md
    - lens.archive.prompt.md
    # Discovery
    - lens.onboard.prompt.md
    - lens.discover.prompt.md
    - lens.bootstrap.prompt.md
    # Governance
    - lens.constitution.prompt.md
    # Context
    - lens.lens.prompt.md
    # Help
    - lens.help.prompt.md

# Output Paths
outputs:
  state_file: "_bmad-output/lens/state.yaml"
  event_log: "_bmad-output/lens/event-log.jsonl"
  repo_inventory: "_bmad-output/lens/repo-inventory.yaml"
  bootstrap_report: "_bmad-output/lens/bootstrap-report.md"
  dashboards: "_bmad-output/lens/dashboards/"
  initiatives_dir: "_bmad-output/lens/initiatives/"
  profiles_dir: "_bmad-output/lens/profiles/"
  snapshots_dir: "_bmad-output/lens/snapshots/"

# Templates
templates:
  directory: "templates/"
  files:
    - state-template.yaml
    - initiative-template.yaml

# Documentation
docs:
  directory: "docs/"
  copilot_instructions: "docs/copilot-instructions.md"
  files:
    - getting-started.md
    - architecture.md
    - configuration.md
    - branch-topology.md
    - constitution-guide.md
    - migration-from-lens-work.md
    - copilot-instructions.md
    - troubleshooting.md
    - api-reference.md

# Tests
tests:
  directory: "tests/"
  files:
    - lens-tests.spec.md

# Scripts
scripts:
  directory: "scripts/"
  files:
    - validate.js

# Git Configuration
git:
  fetch_strategy: background
  fetch_ttl: 60
  branch_patterns:
    domain: "{domain_prefix}"
    service: "{domain_prefix}-{service_prefix}"
    root: "{featureBranchRoot}"
    audience_small: "{featureBranchRoot}-small"
    audience_medium: "{featureBranchRoot}-medium"
    audience_large: "{featureBranchRoot}-large"
    phase: "{featureBranchRoot}-{audience}-p{phase_number}"
    workflow: "{featureBranchRoot}-{audience}-p{phase_number}-{workflow_name}"

# Background Workflow Trigger Map
background_triggers:
  workflow_start:
    - state-sync      # Read current state
    - constitution-check  # Validate governance
  workflow_end:
    - state-sync      # Write updated state
    - event-log       # Append event
    - checklist-update  # Update checklists
  phase_transition:
    - branch-validate  # Verify topology
    - state-sync      # Read + write state
    - event-log       # Append event
    - constitution-check  # Validate governance
    - checklist-update  # Update checklists
  initiative_create:
    - branch-validate  # Create topology
    - state-sync      # Initialize state
    - event-log       # Append creation event
  error:
    - event-log       # Log error event
    - state-sync      # Mark error in state
