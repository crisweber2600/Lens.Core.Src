# Sprint Status Template
# This is an EXAMPLE showing the expected format
# The actual file will be generated with all epics/stories from your epic files

# generated: {date}
# project: {project_name}
# project_key: {project_key}
# tracking_system: {tracking_system}
# story_location: {story_location}

# STATUS DEFINITIONS:
# ==================
# Epic Status:
#   - backlog: Epic not yet started
#   - in-progress: Epic actively being worked on
#   - done: All stories in epic completed
#
# Story Status:
#   - backlog: Story only exists in epic file
#   - ready-for-dev: Story file created, ready for development
#   - in-progress: Developer actively working on implementation
#   - review: Implementation complete, ready for review
#   - done: Story completed
#
# Retrospective Status:
#   - optional: Can be completed but not required
#   - done: Retrospective has been completed
#
# ASSIGNMENT FIELDS (Multi-Developer Coordination):
# =================================================
# Each story entry supports optional assignment tracking for parallel development:
#   assigned_to:  Developer name/handle who claimed this story (from profile.yaml → name)
#   claimed_at:   ISO8601 timestamp when the story was claimed
#
# Claim semantics:
#   - Claims are advisory, not hard locks — designed for small teams (2-5 devs)
#   - Before claiming, developers MUST pull the control repo to see current assignments
#   - Claims expire after 48 hours of no activity (no commits on story branch)
#   - Workflows skip stories with non-empty assigned_to during auto-discovery
#   - The create-story and dev-story workflows set assigned_to automatically
#
# Entry formats (both supported):
#   Simple:     1-1-user-auth: ready-for-dev
#   Extended:   1-1-user-auth: { status: ready-for-dev, assigned_to: "alice", claimed_at: "2026-03-04T10:00:00Z" }
#
# Workflows reading sprint-status MUST handle both formats:
#   - If value is a string → treat as status, assigned_to = "", claimed_at = ""
#   - If value is an object → read .status, .assigned_to, .claimed_at
#
# WORKFLOW NOTES:
# ===============
# - Mark epic as 'in-progress' when starting work on its first story
# - SM typically creates next story ONLY after previous one is 'done' to incorporate learnings
# - Dev moves story to 'review', then Dev runs code-review (fresh context, ideally different LLM)
# - In multi-dev mode, multiple stories across different epics can be in-progress simultaneously

# EXAMPLE STRUCTURE (your actual epics/stories will replace these):

generated: 05-06-2-2025 21:30
project: My Awesome Project
project_key: NOKEY
tracking_system: file-system
story_location: "{story_location}"

development_status:
  epic-1: backlog
  1-1-user-authentication: done
  1-2-account-management: { status: ready-for-dev, assigned_to: "", claimed_at: "" }
  1-3-plant-data-model: backlog
  1-4-add-plant-manual: backlog
  epic-1-retrospective: optional

  epic-2: backlog
  2-1-personality-system: backlog
  2-2-chat-interface: backlog
  2-3-llm-integration: backlog
  epic-2-retrospective: optional
