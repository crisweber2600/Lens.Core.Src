---
# @lens Agent Configuration
# Lens-Work Module v2.0
# Unified agent orchestrating lifecycle via five skills
# Reference: TD-005 (Architecture Decision)

name: "@lens"
displayName: "Lens-Work Agent"
description: "Unified agent orchestrating the lens-work lifecycle engine with five skills and delegating to BMM phase agents"
icon: "🔬"
version: "2.0.0"

# Agent Skills
skills:
  - name: "git-orchestration"
    description: "Branch creation, PR operations, topology management"
    file: "_bmad/lens-work/skills/git-orchestration.md"
  
  - name: "state-management"
    description: "Lifecycle state, event log, dual-write contract"
    file: "_bmad/lens-work/skills/state-management.md"
  
  - name: "discovery"
    description: "Initiative discovery, artifact resolution, onboarding"
    file: "_bmad/lens-work/skills/discovery.md"
  
  - name: "constitution"
    description: "Governance rules, 4-level hierarchy, gate validation"
    file: "_bmad/lens-work/skills/constitution.md"
  
  - name: "checklist"
    description: "Gate readiness, progressive checklist, artifact checks"
    file: "_bmad/lens-work/skills/checklist.md"

# Top-Level Menu
menu:
  - groupName: "Core Commands"
    commands:
      - trigger: "onboard"
        label: "Start onboarding flow"
        subPrompt: "./.github/prompts/lens-work.onboard.prompt.md"
        args: []
      
      - trigger: "new"
        label: "Create new initiative"
        subPrompt: "./.github/prompts/lens-work.new-initiative.prompt.md"
        args: ["initiative_name", "track"]
      
      - trigger: "status"
        label: "Show current status"
        subPrompt: "./.github/prompts/lens-work.status.prompt.md"
        args: []
      
      - trigger: "next"
        label: "Execute next action"
        subPrompt: "./.github/prompts/lens-work.next.prompt.md"
        args: []

  - groupName: "Phase Commands"
    commands:
      - trigger: "preplan"
        label: "Start PrePlan phase"
        subPrompt: "./.github/prompts/lens-work.preplan.prompt.md"
        agent: "Mary (Analyst)"
      
      - trigger: "businessplan"
        label: "Start BusinessPlan phase"
        subPrompt: "./.github/prompts/lens-work.businessplan.prompt.md"
        agent: "John (PM) + Sally (UX)"
      
      - trigger: "techplan"
        label: "Start TechPlan phase"
        subPrompt: "./.github/prompts/lens-work.techplan.prompt.md"
        agent: "Winston (Architect)"
      
      - trigger: "devproposal"
        label: "Start DevProposal phase"
        subPrompt: "./.github/prompts/lens-work.devproposal.prompt.md"
        agent: "John (PM)"
      
      - trigger: "sprintplan"
        label: "Start SprintPlan phase"
        subPrompt: "./.github/prompts/lens-work.sprintplan.prompt.md"
        agent: "Bob (Scrum Master)"

  - groupName: "Audience Promotion"
    commands:
      - trigger: "promote-medium"
        label: "Promote to Medium audience (after TechPlan)"
        subPrompt: "./.github/prompts/lens-work.promote-medium.prompt.md"
        args: ["initiative_id"]
      
      - trigger: "promote-large"
        label: "Promote to Large audience (after SprintPlan)"
        subPrompt: "./.github/prompts/lens-work.promote-large.prompt.md"
        args: ["initiative_id"]
      
      - trigger: "promote-base"
        label: "Promote to Base audience (final)"
        subPrompt: "./.github/prompts/lens-work.promote-base.prompt.md"
        args: ["initiative_id"]

  - groupName: "Navigation"
    commands:
      - trigger: "switch"
        label: "Switch active initiative"
        subPrompt: "./.github/prompts/lens-work.switch.prompt.md"
        args: ["initiative_id"]

  - groupName: "Recovery & Governance"
    commands:
      - trigger: "sync"
        label: "Sync state from git (remote-wins)"
        subPrompt: "./.github/prompts/lens-work.sync.prompt.md"
        args: []
      
      - trigger: "fix"
        label: "Repair state (3-category: drift|gate|divergence)"
        subPrompt: "./.github/prompts/lens-work.fix.prompt.md"
        args: ["category"]
      
      - trigger: "constitution"
        label: "Display or manage constitution"
        subPrompt: "./.github/prompts/lens-work.constitution.prompt.md"
        args: ["action"]

  - groupName: "Utility"
    commands:
      - trigger: "adjust"
        label: "Lightweight post-dev tweak (abbreviated review)"
        subPrompt: "./.github/prompts/lens-work.adjust.prompt.md"
        args: ["initiative_id"]

      - trigger: "fix-story"
        label: "Quick correction loop (Quick-Spec → Review → Quick-Dev)"
        subPrompt: "./.github/prompts/lens-work.fix-story.prompt.md"
        args: ["initiative_id"]

