    label: "TechPlan Solutioning"
    workflow: "bmm:3-solutioning/create-architecture"
  
  - trigger: "devproposal"
    agent: "John (PM)"
    label: "DevProposal Specification"
    workflow: "bmm:3-solutioning/create-epics-and-stories"
  
  - trigger: "sprintplan"
    agent: "Bob (Scrum Master)"
    label: "SprintPlan Execution"
