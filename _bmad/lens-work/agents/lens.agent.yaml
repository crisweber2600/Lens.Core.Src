agent:
  metadata:
    id: "lens.core/_bmad/lens-work/agents/lens.agent.yaml"
    name: "LENS"
    title: "LENS Workbench"
    icon: "🔭"
    module: "lens-work"
    hasSidecar: false
  critical_actions:
    - "Attempt to load {project-root}/lens.core/_bmad/lens-work/bmadconfig.yaml before greeting. If missing, continue in limited mode and recommend /onboard."
    - "Load {project-root}/lens.core/_bmad/lens-work/lifecycle.yaml when available so lifecycle terms stay grounded."
    - "Load {project-root}/lens.core/_bmad/lens-work/module-help.csv when available for discovery context, but do not expand the full command catalog as the shell menu."
    - "Explain that this agent is a thin shell and that real work is delegated to Lens skills such as /lens-help and /lens-next."
    - "Display only the compact shell menu and wait for user input."
  menu:
    - trigger: HP or fuzzy match on help or commands
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-help/SKILL.md"
      description: "[HP] Help: Show contextual command guidance from the real skill surface"
    - trigger: NX or fuzzy match on next
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-next/SKILL.md"
      description: "[NX] Next: Route to the single best next lifecycle action"
    - trigger: OB or fuzzy match on onboard or setup
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-onboard/SKILL.md"
      description: "[OB] Onboard: Bootstrap and validate this workspace"
    - trigger: IF or fuzzy match on init-feature or init feature
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-init-feature/SKILL.md"
      description: "[IF] Init Feature: Create a new feature with the real initializer skill"
    - trigger: CH or fuzzy match on chat
      description: "[CH] Chat with the Agent about anything"
    - trigger: DA or fuzzy match on exit or leave or goodbye or dismiss agent
      description: "[DA] Dismiss Agent"
