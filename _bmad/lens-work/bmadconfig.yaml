# ─────────────────────────────────────────────────────────────────────────────
# UNIVERSAL WORKFLOW CONVENTIONS
# These rules apply to EVERY agent, workflow, and step in the lens-work module.
# ─────────────────────────────────────────────────────────────────────────────
conventions:

  implementation_model: llm-first
  # All logic in workflows, agents, and skills MUST be LLM-executable (plain
  # language instructions, YAML schemas, decision tables, numbered steps).
  # Runtime code execution (Node.js, Python, bash scripts) is PROHIBITED inside
  # workflow markdown, skill markdown, and agent markdown files.

  no_runtime_js:
    rule: DO NOT call require(), import, or reference lib/*.js files from within
          any workflow .md, skill .md, or agent .md file.
    rationale: JS lib files cause runtime execution errors when an LLM agent
               attempts to interpret them as instructions. All logic must be
               expressed as LLM-readable prose, YAML schemas, or decision tables.
    enforcement: hard — any new workflow step containing a require() call or a
                 ```python / ```javascript code block that describes LLM behavior
                 (not a target code search pattern) is a defect.
    exceptions:
      - ```yaml blocks — allowed (data schemas, config examples)
      - ```bash blocks — allowed ONLY for git commands inside git-orchestration skill
      - Code blocks showing TARGET CODEBASE PATTERNS to search for (e.g., Express
        route patterns, FastAPI decorators in analyze-codebase workflows) — allowed
        because they represent code to identify in analyzed repos, not LLM instructions
    deprecated_lib_files:
      - lib/constitution.js       → replaced by skills/constitution.md (Parts 1–10)
      - lib/constitution-display.js → replaced by skills/constitution.md (Part 6)
      - lib/constitution-stress.js  → replaced by skills/constitution.md (Part 9)
    active_agents:
      - agents/constitution.md    → @lens/constitution — full skill-based replacement

  workflow_step_authoring:
    instruction_style: Numbered prose steps, decision tables, or YAML schemas.
    algorithm_style: If logic requires branching, use Markdown tables (Condition → Action)
                     or numbered if/then steps. Never use Python/JS pseudocode to
                     describe what the LLM should do.
    data_shapes: YAML code blocks are fine for documenting data structures and examples.

  skill_primacy:
    rule: When a skill covers a domain (e.g., constitution, git-orchestration,
          state-management), ALL workflows in that domain MUST delegate to the skill.
          Duplicate logic inline in workflow steps is a defect.

  language_specific_governance:
    rule: Constitution workflows MUST support language-specific constitutions in addition
          to universal ones. Each LENS layer (org/domain/service/repo) can have both:
          - Universal: {layer}/constitution.md (applies to all languages)
          - Language-specific: {layer}/{language}/constitution.md (applies only to repos using that language)
    enforcement: hard
    rationale: >
      Different programming languages have different coding standards, architecture patterns,
      and governance requirements. Language-specific constitutions allow organizations to
      defined targeted governance that applies only to relevant repositories.
    load_order: >
      Chain building loads constitutions parent-first: org-universal, org-{lang}, domain-universal,
      domain-{lang}, service-universal, service-{lang}, repo-universal, repo-{lang}.
      Language-specific rules are additive (inheritance) and cannot weaken parent rules.
    scope_enforcement: >
      Language-specific constitutions apply ONLY to target repositories whose primary language
      matches the declaration. Compliance checks detect repo language via .gitattributes, build files,
      source extension analysis, or explicit .bmad/language override.

  article_specific_gates:
    enforcement: hard
    rule: >
      Constitution compliance checks MUST report per-article pass/fail, not just aggregate
      fail_count. Each constitutional article is evaluated as a discrete named gate with
      its own checklist items derived from the article's rule text. Gate results include
      the specific article ID, title, source layer, and violation detail for each failed item.
    rationale: >
      Aggregate pass/fail obscures which constitutional principles were violated and makes
      remediation harder. Per-article gates give developers clear, actionable targets and
      ensure code reviewers can challenge specific violations. Adopted from spec-kit's
      Phase -1 Pre-Implementation Gates pattern.
    skill_reference: constitution skill Part 7b (Article-Specific Gate Generation)

  complexity_tracking:
    enforcement: soft
    rule: >
      When a constitution gate violation is justified and the user proceeds (advisory mode
      or explicit override), a structured justification entry SHOULD be recorded in
      complexity-tracking.md. Each entry documents the violation, governing article,
      why proceeding is necessary, and what simpler alternative was rejected.
    rationale: >
      Creates an audit trail for gate overrides that code reviewers and party-mode teardown
      agents can challenge. Prevents silent accumulation of technical debt from constitution
      exceptions. Adopted from spec-kit's Complexity Tracking pattern.
    storage: "{bmad_docs}/complexity-tracking.md or _bmad-output/implementation-artifacts/complexity-tracking.md"
    downstream_consumers:
      - Code review (Quinn/QA) — challenges override justifications
      - Party mode teardown — evaluates override validity
      - Epic completion review — identifies systemic override patterns
      - Retrospective — feeds process improvement
    skill_reference: constitution skill Part 13 (Complexity Tracking)

  checklist_quality_gates:
    enforcement: soft
    rule: >
      Before implementation begins, any quality checklists in the initiative's BmadDocs
      or implementation artifacts SHOULD be scanned and validated. Incomplete checklists
      are presented to the user with a pass/fail status table. The user may choose to
      proceed with incomplete checklists (override recorded via complexity tracking).
    rationale: >
      Checklists act as "unit tests for English" — validating that requirements are
      well-defined before code is written. Prevents implementation from starting on
      underspecified or unvalidated requirements. Adopted from spec-kit's checklist
      quality gate pattern in the implement phase.
    skill_reference: constitution skill Part 12 (Checklist Quality Gates)

  constitution_sync_impact:
    enforcement: hard
    rule: >
      Constitution amendments MUST include a sync impact report showing the blast radius
      of the change — affected scopes, active initiatives, artifacts requiring re-validation,
      and recommended post-amendment actions. The report MUST be displayed before the
      ratification prompt. MAJOR version changes require explicit acknowledgment of
      the blast radius.
    rationale: >
      Constitutional changes can silently invalidate planning artifacts across many
      initiatives. Without a sync impact report, amendment ratifiers cannot assess the
      downstream consequences of their changes. Adopted from spec-kit's consistency
      propagation and sync impact report pattern.
    version_semantics:
      MAJOR: Article removed or principle weakened — re-run /compliance on ALL affected initiatives
      MINOR: Article added, modified, or deprecated — re-run /compliance on in-progress initiatives
      PATCH: Clarification only — no re-validation required
    skill_reference: constitution skill Part 15 (Sync Impact Reports)

  cross_artifact_analysis:
    enforcement: soft
    rule: >
      Before implementation begins or at phase transitions, a cross-artifact consistency
      analysis SHOULD be available via /analyze. This read-only analysis checks all planning
      artifacts for constitution alignment, coverage gaps, inconsistencies, duplication,
      ambiguity, and underspecification. Constitution violations are CRITICAL severity.
    rationale: >
      Individual artifact compliance checks miss inter-artifact inconsistencies. Cross-artifact
      analysis catches naming mismatches, coverage gaps, and conflicting statements before
      they become implementation defects. Adopted from spec-kit's /speckit.analyze command.
    skill_reference: constitution skill Part 14 (Cross-Artifact Consistency Analysis)

  auto_resolve_gate_blocks:
    enforcement: hard
    rule: >
      When a constitutional gate blocks in enforced mode, the workflow MUST NOT halt and
      wait for manual intervention. Instead, it automatically: (1) creates a fix branch
      from the current branch, (2) auto-resolves the violations in that branch,
      (3) opens a PR back to the original branch, and (4) instructs the developer to
      merge the PR and re-run /dev or @lens done to continue.
    rationale: >
      Blocked gates that require manual intervention break developer flow and create
      context-switching overhead. Auto-resolution keeps the developer in the workflow
      loop — they review a PR (familiar pattern) and re-run the workflow. The fix
      branch preserves the original branch state and uses standard PR review as the
      human verification checkpoint.
    skill_reference: constitution skill Part 16 (Auto-Resolve Gate Blocks)
    branch_pattern: "fix/constitution-{gate_id}-{initiative_id}"
    pr_convention: >
      PR title: fix(constitution): resolve N gate violation(s) — {initiative_id}
      PR body includes: violations table, resolution applied, manual-review items,
      next steps (merge + rerun /dev)

  data_zone_enforcement:
    # Hard rules that apply to every agent, workflow, and step in lens-work.
    # These rules solve the branching-policy problem: governance changes made inside
    # an initiative branch are invisible to all other initiatives.  By keeping
    # governance artifacts in a standalone repo (bmad.lens.governance) they travel
    # their own straight path to main \u2014 untangled from any initiative branch.

    governance_repo:
      alias: bmad.lens.governance
      remote_url: https://github.com/crisweber2600/bmad.lens.governance
      local_path: TargetProjects/lens/lens-governance   # per service-map.yaml
      prerequisite_enforcement: hard
      rule: >
        ALL governance workflows (amendment-propagation, constitution, resolve-constitution,
        compliance-check) MUST verify that TargetProjects/lens/lens-governance exists and
        is a valid git repo before executing.  If missing, halt and instruct the user to
        run '@lens check-repos' to clone it.

    write_prohibition:
      enforcement: hard
      rule: >
        Agents MUST NEVER write constitution, roster, or policy data to any path
        inside _bmad-output/lens-work/ or inside the initiatives/ tree.
        Governance data belongs exclusively in TargetProjects/lens/lens-governance/.
      violation_action: halt with error explaining the data zone boundary.

    branch_prohibition:
      enforcement: hard
      rule: >
        Any write to TargetProjects/lens/lens-governance/ MUST occur on a branch
        that matches the pattern universal/{slug} in the governance repo.
        If the governance repo's current branch does not match that pattern and is
        not 'main', halt and instruct the user to create a universal/* branch first.

    initiative_isolation:
      enforcement: hard
      rule: >
        Initiative branches in the control repo MUST NEVER contain commits to
        TargetProjects/lens/lens-governance/.  The governance repo is a separate
        git working tree with its own commit history.

  git_discipline:
    auto_push:
      enforcement: hard
      rule: >
        EVERY git commit in ANY lens-work workflow, skill, or agent MUST be
        immediately followed by a git push command in the same step.
        This ensures that all workflow progress is immediately visible on the
        remote and prevents loss of work due to local-only commits.
      rationale: >
        Lens-work coordinates distributed teams and cross-repo workflows.
        Commits that remain local break collaboration, prevent PR creation,
        and violate the "always synced" assumption that gate checks depend on.
      pattern: |
        git commit -m "workflow(action): description"
        git push origin "${branch_name}"
      exceptions:
        - Transient branches used within a single workflow step that will be
          discarded without merge (must be documented inline).
      validation: >
        Any workflow file containing 'git commit' must have a matching 'git push'
        within the same numbered step or bash code block.

    auto_checkout_on_clone:
      enforcement: hard
      rule: >
        EVERY git clone in ANY lens-work workflow MUST be immediately followed
        by a git checkout command that switches to the default/last-committed
        branch. This ensures that cloned repositories are in a trackable state
        and users are on the current development branch immediately.
      rationale: >
        After git clone, the working directory is in detached HEAD state.
        Without explicit branch checkout, the repo is not in a trackable state,
        git operations may fail, and the repository state is ambiguous.
        Auto-checkout to the default branch (symbolic-ref) ensures immediate
        usability and consistency across all cloned repositories.
      pattern: |
        git clone {remote_url} {local_path}
        cd {local_path}
        git checkout $(git symbolic-ref refs/remotes/origin/HEAD | cut -d'/' -f4)
      fallbacks:
        - Try expected_branch from config (e.g., "main", "develop")
        - Try first available remote branch
        - Report error if no branches exist
      verification: |
        if git -C {local_path} symbolic-ref HEAD > /dev/null 2>&1; then
          BRANCH=$(git -C {local_path} symbolic-ref --short HEAD)
          echo "✅ Checked out to branch: $BRANCH"
        else
          echo "❌ Still in detached HEAD state"
          exit 1
        fi
      validation: >
        Any workflow file containing 'git clone' must have a matching 'git checkout'
        within the same numbered step or bash code block. Post-clone state must be
        verified to not be in detached HEAD.

  visual_first_documentation:
    enforcement: hard
    rule: >
      EVERY document written by lens-work MUST include at least one Mermaid diagram
      to show information visually. Documents without visual diagrams are incomplete.
      The visual representation should appear early in the document to provide
      immediate context and understanding.
    rationale: >
      Visual diagrams dramatically improve document comprehension, retention,
      and usability. They provide immediate context that text alone cannot convey.
      Mermaid diagrams are universally supported in Markdown renderers and
      enable stakeholders to quickly grasp complex relationships, flows, and structures.
    mandatory_diagrams:
      architecture.md:
        - System architecture diagram (flowchart or C4)
        - Component interaction diagram (sequenceDiagram)
      prd.md:
        - User journey flow (flowchart)
        - Feature relationship diagram (mindmap or flowchart)
      product-brief.md:
        - Problem-solution flow (flowchart)
        - Stakeholder map (flowchart)
      epics.md:
        - Epic dependency graph (flowchart)
        - Feature timeline (gantt)
      stories.md:
        - Story dependency graph (flowchart)
        - Acceptance criteria workflow (flowchart)
      techplan.md:
        - Technical architecture diagram (flowchart or C4)
        - Deployment flow (flowchart)
        - Data flow diagram (sequenceDiagram)
      constitution.md:
        - Constitution hierarchy (flowchart)
        - Compliance flow (flowchart)
      discovery_docs:
        - Code structure diagram (classDiagram)
        - API flow diagram (sequenceDiagram)
        - Data model diagram (erDiagram)
    diagram_placement:
      rule: Place primary diagram within first 20% of document (after overview)
      additional: Add diagrams throughout to break text blocks > 100 lines
    diagram_types:
      use_when:
        flowchart: Process flows, decision trees, system architecture, relationships
        sequenceDiagram: API interactions, authentication flows, temporal processes
        classDiagram: Code structure, object models, component relationships
        erDiagram: Database schemas, entity relationships, data models
        stateDiagram-v2: State machines, lifecycle stages, workflow states
        gantt: Project timelines, phase planning, sprint schedules
        gitGraph: Branch strategies, release workflows
        mindmap: Concept maps, feature hierarchies, brainstorming
    quality_standards:
      - Diagram must be syntactically valid Mermaid v10+ syntax
      - Nodes should have clear, concise labels (3-7 words)
      - Limit diagrams to 5-15 nodes for readability
      - Use subgraphs for logical grouping when needed
      - Include diagram title as markdown heading before diagram
      - Add brief text explanation after each diagram
    enforcement_pattern: |
      # Before writing ANY document:
      1. Identify document type and required diagram types
      2. Gather data/relationships to visualize
      3. Create diagram(s) using appropriate Mermaid syntax
      4. Validate syntax mentally or with tool
      5. Place diagram early in document structure
      6. Write supporting text around diagrams
      7. Verify document has minimum required diagrams before saving
    validation: >
      Any document generation workflow, skill, or agent instruction MUST explicitly
      reference mermaid diagram requirements. Documents written without diagrams
      are defects and must be regenerated with visual content.
