# =============================================================================
# Lens-Work Lifecycle Contract v2.0
# =============================================================================
# The single source of truth for lens-work lifecycle behavior.
# The @lens agent (with 5 skills) and all workflows import
# this contract. No lifecycle semantics should be hardcoded elsewhere.
#
# Derived from architectural brainstorming session 2026-02-23.
# =============================================================================

schema_version: 2

# -----------------------------------------------------------------------------
# FUNDAMENTAL TRUTHS (non-negotiable design axioms)
# -----------------------------------------------------------------------------
# Every mechanism in lens-work must trace to at least one of these truths.
# If a mechanism doesn't serve any truth, it is accidental complexity.
fundamental_truths:
  ft1: "Planning artifacts must exist and be reviewed before code is written"
  ft2: "AI agents must work within disciplined constraints, not freestyle"
  ft3: "Multi-service initiatives must have coordinated lifecycle governance"

# Design principle: Enforce constraints through structure (branches, gates,
# required files) rather than instructions (prompts, documentation, conventions).

# -----------------------------------------------------------------------------
# LENS HIERARCHY
# -----------------------------------------------------------------------------
lens_hierarchy:
  levels: [org, domain, service, repo]
  constitution_inheritance: additive  # Lower levels can only ADD, never remove
  # Resolution: merge all levels, union of all requirements

# -----------------------------------------------------------------------------
# AUDIENCES (promotion backbone)
# -----------------------------------------------------------------------------
# Audiences are the primary progression axis. Phases happen WITHIN audiences.
# Promotion between audiences IS the review gate.
audiences:
  # NOTE ON AUDIENCE ASSIGNMENT CONVENTION:
  # The `phases` list here defines which phases were *created during* this audience scope.
  # However, the prompts for devproposal and sprintplan branch from medium and large
  # respectively (post-promotion). This is intentional:
  #   - preplan, businessplan, techplan → branch from small (created in small scope)
  #   - devproposal → branches from medium (requires small→medium promotion first)
  #   - sprintplan → branches from large (requires medium→large promotion first)
  #   - dev → branches from base (requires large→base promotion first)
  # The `audience: small` field on each phase below indicates the IC work context,
  # while the prompt/router `branch_pattern` determines the actual branching audience.
  small:
    role: "IC creation work"
    description: "Where ALL 5 planning phases happen — individual contributor generates artifacts"
    phases: [preplan, businessplan, techplan, devproposal, sprintplan]
  medium:
    role: "Lead review"
    description: "Adversarial review gate using party mode — promotion carries planning artifacts"
    phases: []
    entry_gate: adversarial-review
    entry_gate_mode: party
  large:
    role: "Stakeholder approval"
    description: "Stakeholder sign-off — promotion carries planning artifacts"
    phases: []
    entry_gate: stakeholder-approval
  base:
    role: "Ready for execution"
    description: "Constitution-gated — @lens validates before promotion"
    phases: []
    entry_gate: constitution-gate

# -----------------------------------------------------------------------------
# PHASES
# -----------------------------------------------------------------------------
# Named phases replace numbered phases (p1-p4). Each phase is owned by a
# specific BMM agent who is responsible for artifact generation.
phases:
  preplan:
    display_name: "PrePlan"
    agent: mary
    agent_role: Analyst
    supporting_agents: []
    description: "Analysis — brainstorm, research, product brief, project documentation"
    artifacts:
      - product-brief
      - research
      - brainstorm
    audience: small
    # Legacy mapping (for adapter during migration)
    legacy_phase_number: 1
    legacy_gate_key: pre_plan

  businessplan:
    display_name: "BusinessPlan"
    agent: john
    agent_role: PM
    supporting_agents: [sally]
    description: "Business planning — PRD creation/validation, UX design"
    artifacts:
      - prd
      - ux-design
    audience: small
    legacy_phase_number: 2
    legacy_gate_key: plan

  techplan:
    display_name: "TechPlan"
    agent: winston
    agent_role: Architect
    supporting_agents: []
    description: "Technical design — architecture document, technical decisions"
    artifacts:
      - architecture
    audience: small
    legacy_phase_number: 3
    legacy_gate_key: tech_plan

  devproposal:
    display_name: "DevProposal"
    agent: john
    agent_role: PM
    supporting_agents: []
    description: "Implementation proposal — epics, stories, readiness check"
    artifacts:
      - epics
      - stories
      - implementation-readiness
    audience: small
    legacy_phase_number: 4
    legacy_gate_key: story_gen

  sprintplan:
    display_name: "SprintPlan"
    agent: bob
    agent_role: Scrum Master
    supporting_agents: []
    description: "Sprint planning — sprint-status, individual story files"
    artifacts:
      - sprint-status
      - story-files
    audience: small
    legacy_phase_number: 5
    legacy_gate_key: review

# Phase ordering (canonical sequence for full track)
phase_order: [preplan, businessplan, techplan, devproposal, sprintplan]

# -----------------------------------------------------------------------------
# TRACKS (predefined lifecycle profiles)
# -----------------------------------------------------------------------------
# The canonical lifecycle defines all possible phases.
# Each initiative selects a track that determines which phases are active.
# Constitution enforcement controls which tracks are permitted per LENS layer.
tracks:
  full:
    description: "Complete lifecycle — all phases, all audiences"
    phases: [preplan, businessplan, techplan, devproposal, sprintplan]
    audiences: [small, medium, large, base]
    start_phase: preplan

  feature:
    description: "Known business context — skip research, start at business plan"
    phases: [businessplan, techplan, devproposal, sprintplan]
    audiences: [small, medium, large, base]
    start_phase: businessplan

  tech-change:
    description: "Pure technical change — no business case needed"
    phases: [techplan, sprintplan]
    audiences: [small, medium, large, base]
    constitution_controlled_gates: [devproposal, medium-to-large]
    start_phase: techplan

  hotfix:
    description: "Urgent fix — minimal planning, fast to execution"
    phases: [techplan]
    audiences: [small, base]
    constitution_controlled_gates: [adversarial-review]
    start_phase: techplan

  spike:
    description: "Research only — no implementation"
    phases: [preplan]
    audiences: [small]
    start_phase: preplan

  quickdev:
    description: "Rapid execution — delegates to target-project agents for implementation with parity verification"
    phases: [devproposal]
    audiences: [small, base]
    constitution_controlled_gates: [adversarial-review]
    start_phase: devproposal

# -----------------------------------------------------------------------------
# ADVERSARIAL REVIEW (party mode)
# -----------------------------------------------------------------------------
# All adversarial reviews invoke party mode — multi-agent group discussion.
# Lead reviewer drives; participants challenge from their expertise.
# Constitution can ADD participants per domain/service (additive inheritance).
adversarial_review:
  mode: party
  reviews:
    product-brief:
      lead: john
      participants: [john, winston, sally]
      focus: "Actionable? Buildable? User-centered?"
    prd:
      lead: winston
      participants: [winston, mary, sally]
      focus: "Buildable? Well-researched? UX-aligned?"
    ux-design:
      lead: john
      participants: [john, winston, mary]
      focus: "Serves requirements? Technically feasible? Grounded?"
    architecture:
      lead: john
      participants: [john, mary, bob]
      focus: "Meets spec? Practical? Sprintable?"
    epics-and-stories:
      lead: winston
      participants: [winston, bob, amelia]
      focus: "Buildable? Right-sized? Implementable?"

# -----------------------------------------------------------------------------
# BRANCH TOPOLOGY — LENS-WORK REPO (planning artifacts)
# -----------------------------------------------------------------------------
# Rich branch topology for human-speed review gates.
# All planning artifacts live here, never in target code repos.
# Avoids false positive security scans in code repos.
planning_repo:
  artifacts_location: central-only
  branch_patterns:
    initiative_root: "{initiative-root}"
    audience: "{initiative-root}-{audience}"
    phase: "{initiative-root}-{audience}-{phase}"
    workflow: "{initiative-root}-{audience}-{phase}-{workflow}"
  merge_chain:
    # Within an audience: phase branches merge into audience branch
    - source: "{initiative-root}-{audience}-{phase}"
      target: "{initiative-root}-{audience}"
      type: phase-completion
    # Audience promotions: audience branches merge into next audience
    - source: "{initiative-root}-small"
      target: "{initiative-root}-medium"
      type: audience-promotion
      gate: adversarial-review
    - source: "{initiative-root}-medium"
      target: "{initiative-root}-large"
      type: audience-promotion
      gate: stakeholder-approval
    - source: "{initiative-root}-large"
      target: base
      type: audience-promotion
      gate: constitution-gate

# -----------------------------------------------------------------------------
# BRANCH TOPOLOGY — TARGET PROJECTS (code execution)
# -----------------------------------------------------------------------------
# GitFlow with Jira-linked branch names.
# AI-speed execution (sprints in hours, not weeks).
target_projects:
  branching_model: gitflow
  branch_patterns:
    story: "feature/{jira-storyid}"
    epic: "feature/{jira-epicid}"
    integration: develop
    release: "release/{version}"
    production: main
  merge_chain:
    - source: "feature/{jira-storyid}"
      target: "feature/{jira-epicid}"
      type: story-completion
      gate: code-review
    - source: "feature/{jira-epicid}"
      target: develop
      type: epic-completion
      gate: feature-complete-review
    - source: develop
      target: "release/{version}"
      type: release-cut
      gate: release-readiness
    - source: "release/{version}"
      target: main
      type: production-deploy
      gate: production-gate
  # Planning audience levels mirror code merge gates
  merge_gate_isomorphism:
    "phase → audience":    "story → epic"
    "small → medium":      "epic → develop"
    "medium → large":      "develop → release"
    "large → base":        "release → main"

# -----------------------------------------------------------------------------
# INITIATIVE CONFIGURATION
# -----------------------------------------------------------------------------
initiative:
  scope_levels: [repo, service, domain, org]
  scope_behavior:
    repo:
      coupling: none
      description: "Single-repo initiative, no coupling question"
    service:
      coupling: initiator-decides
      description: "Multi-repo within one service, initiator chooses repo coupling"
    domain:
      coupling: initiator-decides
      description: "Multi-service, initiator chooses service coupling"
    org:
      coupling: initiator-decides
      description: "Cross-domain, initiator chooses domain + service coupling"

# -----------------------------------------------------------------------------
# CONSTITUTION SCHEMA
# -----------------------------------------------------------------------------
constitution:
  inheritance: additive
  resolution_order: [org, domain, service, repo]
  capabilities:
    - permitted_tracks
    - required_gates
    - additional_review_participants
    - required_artifacts
    - enforce_stories

# -----------------------------------------------------------------------------
# DATA ZONES
# -----------------------------------------------------------------------------
# Authoritative classification of every data artifact produced by lens-work.
# Each zone has a dedicated write location and branch strategy so that changes
# to one zone can never be accidentally captured on another zone's branch.
#
# ENFORCEMENT: Agents MUST refuse to write governance-zone data into the
# initiatives/ tree of the control repo, and vice versa.
# -----------------------------------------------------------------------------
data_zones:
  governance:
    description: >
      Universal artifacts shared across all initiatives and all control repos that
      clone bmad.lens.release.  Lives in a standalone governance repo so it has
      no coupling to any initiative branch.
    # Governance repo coordinates are loaded at runtime from:
    #   _bmad-output/lens-work/governance-setup.yaml
    # See governance-setup.example.yaml for the template.
    setup_file: "_bmad-output/lens-work/governance-setup.yaml"
    # Defaults (overridden by setup_file at runtime):
    repo: bmad.lens.governance
    remote_url: https://github.com/crisweber2600/bmad.lens.governance
    local_path: TargetProjects/lens/lens-governance
    artifacts:
      - constitutions/         # 4-level hierarchy: org / domain / service / repo
      - roster/                # Team member records
      - policies/              # Org-wide process and coding policies
      - repo-inventory.yaml    # Canonical discovered-repo inventory
    branch_strategy:
      pattern: "universal/{slug}"
      merge_target: main
      description: >-
        Changes to governance artifacts MUST be made on a universal/* branch in
        the governance repo, never on a branch in the control repo.
    write_roles: [Tech Lead, Architect]
    pr_required: true
    codeowners: true
    prerequisite: >
      @lens MUST verify that the governance repo is cloned at the path specified
      in governance-setup.yaml before executing any governance workflow.
      If missing, run check-repos first.

  initiative:
    description: >
      Initiative-scoped planning artifacts.  Lives in the control repo under
      _bmad-output/lens-work/initiatives/.  Each initiative has its own branch
      subtree and never overlaps with governance or personal zones.
    repo: bmad.lens.release   # this control repo
    local_path: _bmad-output/lens-work/initiatives/
    artifacts:
      - "initiatives/{domain}/"
      - "initiatives/{domain}/{service}/"
      - "initiatives/{domain}/{service}/{feature}.yaml"
      - "initiatives/{domain}/{service}/phases/"
    branch_strategy:
      pattern: "{initiative_root}-{audience}-{phase}"
      merge_target: "{initiative_root}"
      description: >-
        Full 5-level branch topology per lifecycle.yaml#planning_repo.

  personal:
    description: >
      Machine-local, git-ignored user data.  Never committed to any repo.
      Contains credentials and user preferences.
    local_path: _bmad-output/lens-work/personal/
    git_ignored: true
    artifacts:
      - personal/profile.yaml
      - personal/github-credentials.yaml
      - personal/personal-repo-inventory.yaml
    branch_strategy: none   # local only, never pushed

# -----------------------------------------------------------------------------
# AGENT ROLES
# -----------------------------------------------------------------------------
agents:
  # Phase-facing agents (own lifecycle phases)
  mary:
    role: Analyst
    owns_phases: [preplan]
    capabilities: [brainstorm, research, create-brief, document-project]
  john:
    role: PM
    owns_phases: [businessplan, devproposal]
    capabilities: [create-prd, validate-prd, edit-prd, create-epics-and-stories, implementation-readiness, correct-course]
  winston:
    role: Architect
    owns_phases: [techplan]
    capabilities: [create-architecture, implementation-readiness]
  sally:
    role: UX Designer
    supports_phases: [businessplan]
    capabilities: [create-ux-design]
  bob:
    role: Scrum Master
    owns_phases: [sprintplan]
    capabilities: [sprint-planning, create-story, retrospective, correct-course]
  amelia:
    role: Developer
    execution_context: target-projects
    capabilities: [dev-story, code-review]
  quinn:
    role: QA
    execution_context: target-projects
    capabilities: [test-automation, test-review]

  # @lens unified agent skills (cross-cutting)
  # In v2, all infrastructure roles are skills of the single @lens agent
  lens:
    role: Router
    skill: "@lens (core)"
    description: "User-facing lifecycle router — decides what workflow/agent to invoke"
  git-orchestration:
    role: Git Discipline
    skill: "@lens/git-orchestration"
    description: "Branch topology, PR creation, merge gate validation"
  state-management:
    role: State Management
    skill: "@lens/state-management"
    description: "Personal state, event log, resume/sync"
  discovery:
    role: Discovery
    skill: "@lens/discovery"
    description: "Repo inventory, doc generation, impact analysis"
  constitution:
    role: Governance
    skill: "@lens/constitution"
    description: "Constitution validation, compliance checks, promotion gates"
