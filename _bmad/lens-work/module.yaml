# LENS Workbench Module Configuration v4.0
# Source repo — CI/CD promotes to lens.core

code: lens
name: "LENS Workbench"
module_version: "4.0.0"
description: "AI-guided lifecycle orchestration with feature-first branching and streamlined governance. Includes Lens Next skills alongside legacy lens-work workflows."
header: "Guided lifecycle router with git-orchestrated discipline"
subheader: "Phase-aware orchestration for BMAD workflows with automated branch topology"
default_selected: false
module_greeting: |
  Welcome to **LENS Workbench** — your guided lifecycle router.
  Type `/help` to see available commands, or `/status` to check your current initiative state.

# Module Type
type: standalone
global: false

# Lifecycle Contract
lifecycle:
  file: lifecycle.yaml
  schema_version: 3.5

# Dependencies
dependencies:
  - core

optional_dependencies:
  - cis
  - tea

# Skills — Lens Next (v4.0+)
skills:
  - id: bmad-lens-feature-yaml
    file: skills/bmad-lens-feature-yaml/SKILL.md
    description: "Feature YAML lifecycle operations and validation"
  - id: bmad-lens-git-state
    file: skills/bmad-lens-git-state/SKILL.md
    description: "Read-only git queries for the Lens 2-branch feature model"
  - id: bmad-lens-git-orchestration
    file: skills/bmad-lens-git-orchestration/SKILL.md
    description: "Git write operations for the Lens 2-branch feature model"
  - id: bmad-lens-constitution
    file: skills/bmad-lens-constitution/SKILL.md
    description: "Governance rules resolution with 4-level additive hierarchy"
  - id: bmad-lens-theme
    file: skills/bmad-lens-theme/SKILL.md
    description: "Theme loading and persona overlay system"
  - id: bmad-lens-init-feature
    file: skills/bmad-lens-init-feature/SKILL.md
    description: "Feature initialization with 2-branch topology, feature YAML, and PR"
  - id: bmad-lens-quickplan
    file: skills/bmad-lens-quickplan/SKILL.md
    description: "End-to-end planning pipeline from business plan through FinalizePlan"
  - id: bmad-lens-log-problem
    file: skills/bmad-lens-log-problem/SKILL.md
    description: "Problem capture and logging for Lens features"
  - id: bmad-lens-status
    file: skills/bmad-lens-status/SKILL.md
    description: "Feature status and portfolio visibility"
  - id: bmad-lens-next
    file: skills/bmad-lens-next/SKILL.md
    description: "Next-action recommendation based on feature state"
  - id: bmad-lens-batch
    file: skills/bmad-lens-batch/SKILL.md
    description: "Universal two-pass batch intake and resume flow for planning targets"
  - id: bmad-lens-switch
    file: skills/bmad-lens-switch/SKILL.md
    description: "Feature context switcher"
  - id: bmad-lens-help
    file: skills/bmad-lens-help/SKILL.md
    description: "Contextual help system for Lens"
  - id: bmad-lens-pause-resume
    file: skills/bmad-lens-pause-resume/SKILL.md
    description: "Pause and resume features with state preservation"
  - id: bmad-lens-retrospective
    file: skills/bmad-lens-retrospective/SKILL.md
    description: "Retrospective analyst for Lens features"
  - id: bmad-lens-complete
    file: skills/bmad-lens-complete/SKILL.md
    description: "Feature lifecycle endpoint — retrospective, archive, and close"
  - id: bmad-lens-move-feature
    file: skills/bmad-lens-move-feature/SKILL.md
    description: "Feature relocation to a new domain/service"
  - id: bmad-lens-split-feature
    file: skills/bmad-lens-split-feature/SKILL.md
    description: "Feature splitting workflow"
  - id: bmad-lens-dashboard
    file: skills/bmad-lens-dashboard/SKILL.md
    description: "Cross-feature dashboard generator with dependency graphs"
  - id: bmad-lens-onboard
    file: skills/bmad-lens-onboard/SKILL.md
    description: "First-run governance repo setup for Lens"
  - id: bmad-lens-migrate
    file: skills/bmad-lens-migrate/SKILL.md
    description: "Migration bridge between LENS v3 and Lens Next"
  - id: bmad-lens-setup
    file: skills/bmad-lens-setup/SKILL.md
    description: "Module configuration installer and help registry"
  - id: bmad-lens-document-project
    file: skills/bmad-lens-document-project/SKILL.md
    description: "Document active feature/project with domain/service/feature scoped output in control and governance repos"

  # Lens Next Phase Skills (v4.0 — lifecycle phase conductors)
  - id: bmad-lens-preplan
    file: skills/bmad-lens-preplan/SKILL.md
    description: "PrePlan phase — brainstorm, research, and product brief for a feature"
  - id: bmad-lens-businessplan
    file: skills/bmad-lens-businessplan/SKILL.md
    description: "BusinessPlan phase — PRD creation and UX design for a feature"
  - id: bmad-lens-techplan
    file: skills/bmad-lens-techplan/SKILL.md
    description: "TechPlan phase — architecture and technical design for a feature"
  - id: bmad-lens-finalizeplan
    file: skills/bmad-lens-finalizeplan/SKILL.md
    description: "FinalizePlan phase — review, bundled planning outputs, and PR handoff for a feature"
  - id: bmad-lens-expressplan
    file: skills/bmad-lens-expressplan/SKILL.md
    description: "ExpressPlan phase — all planning artifacts in one session for a feature"

  # Lens Next Review Skills (v4.0)
  - id: bmad-lens-adversarial-review
    file: skills/bmad-lens-adversarial-review/SKILL.md
    description: "Lifecycle adversarial review gate with party-mode blind-spot challenge"

  # Lens Next Migration Skills (v4.0)
  - id: bmad-lens-dev
    file: skills/bmad-lens-dev/SKILL.md
    description: "Dev phase — epic-level story implementation loop with branch management"
  - id: bmad-lens-bmad-skill
    file: skills/bmad-lens-bmad-skill/SKILL.md
    description: "Unified BMAD skill wrapper — Lens context resolver for registered BMAD skills"
  - id: bmad-lens-sensing
    file: skills/bmad-lens-sensing/SKILL.md
    description: "Cross-initiative overlap detection with constitutional gate enforcement"
  - id: bmad-lens-audit
    file: skills/bmad-lens-audit/SKILL.md
    description: "Cross-initiative compliance audit dashboard"
  - id: bmad-lens-approval-status
    file: skills/bmad-lens-approval-status/SKILL.md
    description: "Promotion PR approval status aggregation"
  - id: bmad-lens-module-management
    file: skills/bmad-lens-module-management/SKILL.md
    description: "Module version checking and self-service upgrade guidance"
  - id: bmad-lens-rollback
    file: skills/bmad-lens-rollback/SKILL.md
    description: "Safe phase rollback with confirmation gates and audit trail"
  - id: bmad-lens-upgrade
    file: skills/bmad-lens-upgrade/SKILL.md
    description: "Schema migration between control repo versions"
  - id: bmad-lens-profile
    file: skills/bmad-lens-profile/SKILL.md
    description: "View and edit onboarding profile"

# Module Installer (BMAD standard contract)
installer: _module-installer/installer.js

# Scripts (cross-platform, no CLI dependencies beyond git+curl)
scripts:
  - id: install
    files:
      - scripts/install.py
    description: "Standalone installer — alternative to _module-installer/installer.js"
  - id: store-github-pat
    files:
      - scripts/store-github-pat.py
    description: "Secure PAT collection into environment variables (run outside AI context)"
  - id: create-pr
    files:
      - scripts/create-pr.py
    description: "PR creation via REST API with provider detection"
  - id: setup-control-repo
    files:
      - scripts/setup-control-repo.py
    description: "Control repo bootstrapping — clone governance and target repos"

# Installation Questions
install_questions:
  target-projects-path:
    prompt: "Path to TargetProjects folder (where repos are cloned)"
    default: "../TargetProjects"
    result: "{project-root}/{value}"
  default-git-remote:
    prompt: "Default git remote provider"
    default: "github"
    result: "{value}"
    single-select:
      - value: "github"
        label: "GitHub"
      - value: "gitlab"
        label: "GitLab"
      - value: "azure-devops"
        label: "Azure DevOps"
  ides:
    prompt: "IDE adapters to install"
    default: ["github-copilot"]
    result: "{value}"
    multi-select:
      - value: "github-copilot"
        label: "GitHub Copilot (VS Code)"
      - value: "cursor"
        label: "Cursor"
      - value: "claude"
        label: "Claude Code"
      - value: "codex"
        label: "Codex CLI"
      - value: "opencode"
        label: "OpenCode"

