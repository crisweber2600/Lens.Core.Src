# Feature YAML Template
# Single source of truth for feature identity and lifecycle state
# Location: {governance-repo}/features/{domain}/{service}/{featureId}/feature.yaml

# --- Feature Identity ---
name: ""
description: ""
featureId: ""
featureSlug: ""

# --- Organization ---
domain: ""
service: ""

# --- Lifecycle ---
phase: "preplan"
# Valid phases: preplan, businessplan, techplan, finalizeplan, expressplan, dev, complete, paused, and *-complete states
track: "quickplan"
# Valid tracks: quickplan, full, feature, hotfix, hotfix-express, express, spike, tech-change

milestones:
  businessplan: null
  techplan: null
  finalizeplan: null
  dev-ready: null
  dev-complete: null
# Each milestone is null (not reached) or an ISO 8601 timestamp (completed)

# --- Team ---
team: []
# Each entry: { username: "", role: "" }
# Roles: lead, contributor, reviewer

# --- Dependencies ---
dependencies:
  depends_on: []
  depended_by: []
# Lists of featureIds

# --- Target Repos ---
target_repos: []
# Each entry may include:
# { name: "", url: "", remote_url: "", local_path: "", branch: "", default_branch: "", visibility: "public|private|internal", dev_branch_mode: "direct-default|feature-id|feature-id-username", dev_branch_name: "", dev_base_branch: "", final_pr_url: "", final_review_report: "", final_party_mode_report: "" }
# `url` remains the compatibility field for downstream skills. `local_path` is project-root-relative and should include the TargetProjects prefix.
# `dev_branch_mode` is the repo-scoped `/dev` branch preference persisted across runs.
# `dev_branch_name`, `dev_base_branch`, `final_pr_url`, `final_review_report`, and `final_party_mode_report` are optional closeout snapshots written by downstream workflows.

# --- Docs ---
docs:
  path: ""
  governance_docs_path: ""
# Control-repo staging path and governance mirror path

# --- Links ---
links:
  retrospective: null
  issues: []
  pull_request: null

# --- Priority ---
priority: "medium"
# Valid: critical, high, medium, low

# --- Timestamps ---
created: ""
updated: ""
phase_transitions: []
# Each entry: { phase: "", timestamp: "", user: "" }
