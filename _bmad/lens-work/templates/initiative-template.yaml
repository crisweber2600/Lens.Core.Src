# Initiative Template for lens-work
# This template defines the schema for initiative config files
# Location: _bmad-output/lens-work/initiatives/{id}.yaml (feature/microservice)
#           _bmad-output/lens-work/initiatives/{domain_prefix}/Domain.yaml (domain)
#           _bmad-output/lens-work/initiatives/{domain_prefix}/{service_prefix}/Service.yaml (service)

id: null                          # Initiative ID
name: null                        # Human-readable name
layer: null                       # domain|service|microservice|feature
domain: null                      # Domain name
domain_prefix: null               # Normalized domain prefix for branch names
service: null                     # Service name (if applicable)
service_prefix: null              # Normalized service prefix (if applicable)

# Target repos
target_repos: []

# Branch topology
featureBranchRoot: null           # Root branch name (feature/microservice only)

# Per-initiative audience configuration
audiences:
  - small
  - medium
  - large

review_audience_map:
  p1: small                       # pre-plan phase
  p2: medium                      # plan/spec phase
  p3: large                       # tech-plan phase
  p4: large                       # story-gen phase
  p5: large                       # review phase
  p6: large                       # dev phase

# Documentation paths
docs:
  path: null                      # e.g., "docs/BMAD/LENS/BMAD.Lens/my-feature"
  domain: null
  service: null
  repo: null

# Gate status (dual-written from state.yaml)
gate_status:
  pre_plan: null                  # null|passed|blocked
  plan: null
  tech_plan: null
  story_gen: null
  review: null
  dev: null

# Current phase (dual-written from state.yaml)
current_phase: null

# Governance
constitution_mode: advisory       # advisory|enforced

# Question mode
question_mode: interactive        # interactive|batch

# Size/complexity
size: null                        # small|medium|large

# Timestamps
created_at: null
last_activity: null
