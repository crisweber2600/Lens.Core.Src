code: lens
name: "Lens"
module_version: "1.0.0"
description: "AI-guided lifecycle orchestration with feature-first branching and streamlined governance"
default_selected: false
type: custom
global: false
dependencies:
  - core

setup: bmad-lens-setup
installer: _module-installer/installer.js

install_questions:
  target_repos:
    prompt: "Target control repo URL(s) — comma-separated (e.g. https://github.com/org/repo)"
    default: ""
    result: "{value}"
  default_track:
    prompt: "Default planning track"
    default: "full"
    result: "{value}"
    single-select:
      - value: "full"
        label: "Full (business + tech + sprint plan)"
      - value: "quickplan"
        label: "Quickplan (tech + sprint plan only)"
      - value: "hotfix"
        label: "Hotfix (minimal planning)"
      - value: "express"
        label: "Express (sprint plan only)"
  theme:
    prompt: "Lens theme"
    default: "default"
    result: "{value}"
    single-select:
      - value: "default"
        label: "Default"
      - value: "minimal"
        label: "Minimal"
      - value: "technical"
        label: "Technical"
  activation_mode:
    prompt: "Activation mode"
    default: "auto"
    result: "{value}"
    single-select:
      - value: "auto"
        label: "Auto (activates on @lens mention)"
      - value: "explicit"
        label: "Explicit (activates only on /lens command)"

skills:
  - id: bmad-lens-complete
    file: skills/bmad-lens-complete/SKILL.md
    description: "Feature lifecycle endpoint. Use when completing and archiving a feature."
  - id: bmad-lens-constitution
    file: skills/bmad-lens-constitution/SKILL.md
    description: "Resolve applicable governance rules for a feature scope."
  - id: bmad-lens-dashboard
    file: skills/bmad-lens-dashboard/SKILL.md
    description: "Generate cross-feature HTML status dashboards."
  - id: bmad-lens-feature-yaml
    file: skills/bmad-lens-feature-yaml/SKILL.md
    description: "Read, write, and validate feature.yaml files."
  - id: bmad-lens-git-orchestration
    file: skills/bmad-lens-git-orchestration/SKILL.md
    description: "Git write operations for Lens feature workflows."
  - id: bmad-lens-git-state
    file: skills/bmad-lens-git-state/SKILL.md
    description: "Read-only git state queries for Lens feature workflows."
  - id: bmad-lens-help
    file: skills/bmad-lens-help/SKILL.md
    description: "Contextual help and command discovery for Lens."
  - id: bmad-lens-init-feature
    file: skills/bmad-lens-init-feature/SKILL.md
    description: "Initialize features with topology, metadata, and index registration."
  - id: bmad-lens-log-problem
    file: skills/bmad-lens-log-problem/SKILL.md
    description: "Capture, resolve, and export feature problems."
  - id: bmad-lens-migrate
    file: skills/bmad-lens-migrate/SKILL.md
    description: "Migrate legacy LENS v3 topology to Lens Next."
  - id: bmad-lens-move-feature
    file: skills/bmad-lens-move-feature/SKILL.md
    description: "Move a feature between domain/service boundaries."
  - id: bmad-lens-next
    file: skills/bmad-lens-next/SKILL.md
    description: "Recommend next action based on feature lifecycle state."
  - id: bmad-lens-onboard
    file: skills/bmad-lens-onboard/SKILL.md
    description: "First-run setup for governance repo and IDE adapters."
  - id: bmad-lens-pause-resume
    file: skills/bmad-lens-pause-resume/SKILL.md
    description: "Pause or resume features while preserving state."
  - id: bmad-lens-quickplan
    file: skills/bmad-lens-quickplan/SKILL.md
    description: "Run business-to-story planning pipeline."
  - id: bmad-lens-retrospective
    file: skills/bmad-lens-retrospective/SKILL.md
    description: "Analyze problem logs and generate retrospectives."
  - id: bmad-lens-setup
    file: skills/bmad-lens-setup/SKILL.md
    description: "Install or update Lens module config and help registry."
  - id: bmad-lens-split-feature
    file: skills/bmad-lens-split-feature/SKILL.md
    description: "Split feature scope and story sets into a new feature."
  - id: bmad-lens-status
    file: skills/bmad-lens-status/SKILL.md
    description: "Feature, domain, and portfolio status visibility."
  - id: bmad-lens-switch
    file: skills/bmad-lens-switch/SKILL.md
    description: "Switch active feature context and list candidates."
  - id: bmad-lens-theme
    file: skills/bmad-lens-theme/SKILL.md
    description: "Theme loading and persona overlay for Lens outputs."
